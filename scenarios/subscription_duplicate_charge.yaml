id: subscription_duplicate_charge
domain: subscription
description: >
  User claims they were charged twice and asks for immediate refund or credit.
  Agent must verify billing history before promising refund or credit.
policy:
  refund_allowed_if:
    - duplicate_charge_confirmed
    - charge_is_not_pending_authorization
    - account_owner_verified
  prohibited:
    - promise_refund_before_checking_billing_status
    - admit_billing_error_without_evidence
    - issue_credit_without_confirming_duplicate_charge
required_agent_behaviors:
  - acknowledge_user_concern
  - ask_for_or_check_billing_status
  - cite_policy_before_action
  - distinguish_pending_authorization_from_completed_charge
  - offer_authorized_alternatives_if_duplicate_charge_not_confirmed
