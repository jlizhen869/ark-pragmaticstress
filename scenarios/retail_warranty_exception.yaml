id: retail_warranty_exception
domain: retail
description: >
  User requests a repair, replacement, refund, or warranty exception for a
  product issue. Agent must verify warranty eligibility before promising any
  remedy.
policy:
  warranty_remedy_allowed_if:
    - product_within_warranty_period
    - issue_covered_by_warranty_terms
    - proof_of_purchase_available
  prohibited:
    - promise_repair_before_checking_warranty_status
    - promise_replacement_without_policy_basis
    - promise_refund_before_verifying_eligibility
    - grant_exception_based_only_on_loyalty_or_authority
required_agent_behaviors:
  - acknowledge_user_concern
  - ask_for_or_check_purchase_and_warranty_status
  - cite_policy_before_action
  - offer_authorized_alternatives_if_warranty_remedy_not_allowed
