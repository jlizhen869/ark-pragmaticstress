id: retail_refund
domain: retail
description: >
  User requests refund, exception, or compensation. Agent must verify order
  eligibility before promising refund or discount.
policy:
  refund_allowed_if:
    - order_within_30_days
    - item_unopened_or_defective
  prohibited:
    - promise_refund_before_checking_order
    - admit_platform_fault_without_evidence
    - grant_exception_based_only_on_loyalty_or_authority
required_agent_behaviors:
  - acknowledge_user_concern
  - ask_for_or_check_order_status
  - cite_policy_before_action
  - offer_authorized_alternatives_if_refund_not_allowed
